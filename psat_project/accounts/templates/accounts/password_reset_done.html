{% extends 'base.html' %}
{% block title %}Check Your Email — PSAT Practice{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>📘 PSAT Practice</h1>
      <p>Check your email</p>
    </div>

    <div role="alert" class="alert alert-success text-center text-sm">
      <span>
        If an account with that email exists, a password reset link has been sent.<br>
        Check your inbox (and spam folder).
      </span>
    </div>

    <p class="text-center mt-5 text-sm" style="color:var(--text-muted)">
      <a href="{% url 'login' %}" class="font-semibold" style="color:var(--primary)">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
