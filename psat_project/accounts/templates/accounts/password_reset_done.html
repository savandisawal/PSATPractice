{% extends 'base.html' %}
{% block title %}Check Your Email — PSAT Practice{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>📘 PSAT Practice</h1>
      <p>Check your email</p>
    </div>

    <div class="alert alert-success" style="text-align:center">
      If an account with that email exists, a password reset link has been sent.<br>
      Check your inbox (and spam folder).
    </div>

    <p style="text-align:center;margin-top:1.25rem;font-size:.9rem;color:var(--text-muted)">
      <a href="{% url 'login' %}" style="color:var(--primary);font-weight:600">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
