{% extends 'base.html' %}
{% block title %}Reset Password — PSAT Practice{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>📘 PSAT Practice</h1>
      <p>Reset your password</p>
    </div>

    <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.25rem;text-align:center">
      Enter the email address linked to your account and we'll send you a reset link.
    </p>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_email">Email address</label>
        <input type="email" name="email" id="id_email" class="form-input" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem">
        Send Reset Link
      </button>
    </form>

    <p style="text-align:center;margin-top:1.25rem;font-size:.9rem;color:var(--text-muted)">
      <a href="{% url 'login' %}" style="color:var(--primary);font-weight:600">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
