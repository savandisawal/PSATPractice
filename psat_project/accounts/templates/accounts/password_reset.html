{% extends 'base.html' %}
{% block title %}Reset Password — PSAT Practice{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>📘 PSAT Practice</h1>
      <p>Reset your password</p>
    </div>

    <p class="text-center text-sm mb-5" style="color:var(--text-muted)">
      Enter the email address linked to your account and we'll send you a reset link.
    </p>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_email">Email address</label>
        <input type="email" name="email" id="id_email" class="form-input" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary w-full justify-center mt-2">
        Send Reset Link
      </button>
    </form>

    <p class="text-center mt-5 text-sm" style="color:var(--text-muted)">
      <a href="{% url 'login' %}" class="font-semibold" style="color:var(--primary)">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
