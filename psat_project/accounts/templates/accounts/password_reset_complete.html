{% extends 'base.html' %}
{% block title %}Password Reset Complete — PSAT Practice{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>📘 PSAT Practice</h1>
    </div>

    <div class="alert alert-success" style="text-align:center">
      Your password has been set. You can now log in with your new password.
    </div>

    <a href="{% url 'login' %}" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:1rem;display:flex">
      Go to Login
    </a>
  </div>
</div>
{% endblock %}
