{% extends 'base.html' %}
{% block title %}Password Reset Complete — PSAT Practice{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-emblem">📘</span>
      <h1>PSAT Practice</h1>
    </div>

    <div role="alert" class="alert alert-success text-center text-sm mb-4">
      <span>Your password has been set. You can now log in with your new password.</span>
    </div>

    <a href="{% url 'login' %}" class="btn-grad w-full">
      Go to Login
    </a>
  </div>
</div>
{% endblock %}
