<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — PSAT Practice</title>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(800px 500px at 15% 10%, rgba(139, 92, 246, .25), transparent 60%),
        radial-gradient(700px 500px at 85% 20%, rgba(34, 211, 238, .22), transparent 60%),
        #f6f8ff;
      color: #1e1b3a;
      text-align: center;
      padding: 1rem;
    }
    .card {
      background: rgba(255, 255, 255, .85);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      box-shadow: 0 24px 70px rgba(109, 40, 217, .15);
    }
    .emoji { font-size: 3rem; }
    h1 { font-size: 1.3rem; margin: .8rem 0 .4rem; }
    p { color: #6b7194; font-size: .95rem; margin: 0 0 1.4rem; }
    button {
      border: none;
      border-radius: 9999px;
      padding: .7rem 1.6rem;
      font-weight: 700;
      font-size: .95rem;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(120deg, #7c3aed, #a855f7);
      box-shadow: 0 8px 20px rgba(124, 58, 237, .35);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">📡</div>
    <h1>You're offline</h1>
    <p>PSAT Practice needs an internet connection to load questions and save your answers.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
